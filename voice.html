<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Memory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --paper: #f7f5f0;
      --accent: #5b4fcf;
      --accent-light: #ede9ff;
      --muted: #7a7895;
      --success: #2d9e6b;
      --danger: #c0392b;
      --card: #ffffff;
      --border: #e2dff5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2rem 1.2rem;
      border-bottom: 1.5px solid var(--border);
      background: var(--card);
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.2rem;
      font-weight: 300;
    }

    .tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--card);
      border-bottom: 1.5px solid var(--border);
    }

    .tab {
      padding: 0.75rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .main {
      flex: 1;
      padding: 2rem;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── RECORD PANEL ── */
    .record-panel { display: flex; flex-direction: column; gap: 1.5rem; }

    .mic-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2.5rem 1rem;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
    }

    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(91,79,207,0.35);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      font-size: 2rem;
    }

    .mic-btn:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(91,79,207,0.45); }

    .mic-btn.recording {
      background: var(--danger);
      animation: pulse 1.2s ease-in-out infinite;
      box-shadow: 0 4px 20px rgba(192,57,43,0.4);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .mic-label {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 400;
    }

    .transcript-box {
      background: var(--accent-light);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--ink);
      min-height: 60px;
    }

    .transcript-box.empty { color: var(--muted); font-style: italic; }

    .mode-row {
      display: flex;
      gap: 0.75rem;
    }

    .mode-btn {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      background: var(--card);
      color: var(--muted);
      transition: all 0.15s;
    }

    .mode-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .action-btn {
      width: 100%;
      padding: 0.85rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      transition: opacity 0.15s, transform 0.1s;
    }

    .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── ANSWER BOX ── */
    .answer-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      display: none;
    }

    .answer-card.visible { display: block; }

    .answer-card .answer-header {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .answer-text {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .speak-btn {
      margin-top: 0.8rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1.5px solid var(--accent);
      background: none;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .speak-btn:hover { background: var(--accent); color: #fff; }

    /* ── NOTES PANEL ── */
    .notes-panel { display: none; flex-direction: column; gap: 1rem; }
    .notes-panel.visible { display: flex; }

    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notes-count {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .clear-btn {
      font-size: 0.78rem;
      color: var(--danger);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
    }

    .note-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.2rem;
    }

    .note-item .note-time {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .note-item .note-text {
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .note-item .note-delete {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 0.5rem;
      font-family: 'DM Sans', sans-serif;
    }

    .note-item .note-delete:hover { color: var(--danger); }

    .empty-notes {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      padding: 0.65rem 1.3rem;
      border-radius: 100px;
      font-size: 0.83rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }

    .status-toast.show { transform: translateX(-50%) translateY(0); }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }
  </style>
</head>
<body>

<header>
  <h1>Voice Memory</h1>
  <p>Speak to remember. Ask to recall.</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('record')">🎙 Speak</button>
  <button class="tab" onclick="switchTab('notes')">📋 My Notes</button>
</div>

<div class="main">

  <!-- RECORD PANEL -->
  <div class="record-panel" id="recordPanel">

    <div class="mode-row">
      <button class="mode-btn selected" id="modeStore" onclick="setMode('store')">💾 Store a note</button>
      <button class="mode-btn" id="modeAsk" onclick="setMode('ask')">🔍 Ask a question</button>
    </div>

    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <span class="mic-label" id="micLabel">Tap to speak</span>
    </div>

    <div class="transcript-box empty" id="transcriptBox">
      Your words will appear here...
    </div>

    <button class="action-btn" id="actionBtn" onclick="handleAction()" disabled>
      Save Note
    </button>

    <div class="answer-card" id="answerCard">
      <div class="answer-header">Answer from your notes</div>
      <div class="answer-text" id="answerText"></div>
      <button class="speak-btn" onclick="speakAnswer()">🔊 Read aloud</button>
    </div>

  </div>

  <!-- NOTES PANEL -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-header">
      <span class="notes-count" id="notesCount">0 notes stored</span>
      <button class="clear-btn" onclick="clearAllNotes()">Clear all</button>
    </div>
    <div id="notesList"></div>
  </div>

</div>

<div class="status-toast" id="toast"></div>

<script>
  // ── STATE ──
  let mode = 'store';
  let transcript = '';
  let isRecording = false;
  let recognition = null;
  let notes = JSON.parse(localStorage.getItem('voiceNotes') || '[]');
  let lastAnswer = '';

  // ── SPEECH RECOGNITION ──
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    document.getElementById('micBtn').textContent = '🚫';
    document.getElementById('micLabel').textContent = 'Speech not supported in this browser. Try Chrome.';
    document.getElementById('micBtn').disabled = true;
  }

  function toggleMic() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    transcript = '';
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹';
      document.getElementById('micLabel').textContent = 'Listening... tap to stop';
      document.getElementById('transcriptBox').classList.remove('empty');
      document.getElementById('transcriptBox').textContent = '...';
      document.getElementById('actionBtn').disabled = true;
    };

    recognition.onresult = (e) => {
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          if (i >= (recognition._lastFinalIndex || 0)) {
            transcript += t + ' ';
            recognition._lastFinalIndex = i + 1;
          }
        } else {
          interim += t;
        }
      }
      document.getElementById('transcriptBox').textContent = (transcript + interim).trim() || '...';
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎤';
      document.getElementById('micLabel').textContent = 'Tap to speak';
      if (transcript.trim()) {
        document.getElementById('actionBtn').disabled = false;
        document.getElementById('transcriptBox').textContent = transcript.trim();
      } else {
        document.getElementById('transcriptBox').classList.add('empty');
        document.getElementById('transcriptBox').textContent = 'Your words will appear here...';
      }
    };

    recognition.onerror = (e) => {
      showToast('Mic error: ' + e.error);
      recognition.stop();
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) recognition.stop();
  }

  // ── MODE ──
  function setMode(m) {
    mode = m;
    document.getElementById('modeStore').classList.toggle('selected', m === 'store');
    document.getElementById('modeAsk').classList.toggle('selected', m === 'ask');
    document.getElementById('actionBtn').textContent = m === 'store' ? 'Save Note' : 'Search My Notes';
    document.getElementById('answerCard').classList.remove('visible');
    transcript = '';
    document.getElementById('transcriptBox').classList.add('empty');
    document.getElementById('transcriptBox').textContent = m === 'store'
      ? 'Speak your note, then tap Save...'
      : 'Ask your question, then tap Search...';
    document.getElementById('actionBtn').disabled = true;
  }

  // ── ACTION ──
  async function handleAction() {
    const text = transcript.trim();
    if (!text) return;

    if (mode === 'store') {
      saveNote(text);
    } else {
      await askQuestion(text);
    }
  }

  function saveNote(text) {
    const note = {
      id: Date.now(),
      text,
      time: new Date().toLocaleString()
    };
    notes.unshift(note);
    localStorage.setItem('voiceNotes', JSON.stringify(notes));
    showToast('✅ Note saved!');
    transcript = '';
    document.getElementById('transcriptBox').classList.add('empty');
    document.getElementById('transcriptBox').textContent = 'Speak your note, then tap Save...';
    document.getElementById('actionBtn').disabled = true;
  }

  async function askQuestion(question) {
    if (notes.length === 0) {
      showToast('No notes stored yet. Record some notes first!');
      return;
    }

    document.getElementById('actionBtn').disabled = true;
    document.getElementById('actionBtn').innerHTML = '<span class="loading-dots">Searching</span>';
    document.getElementById('answerCard').classList.remove('visible');

    const notesText = notes.map((n, i) => `[Note ${i+1} — ${n.time}]: ${n.text}`).join('\n\n');

    const prompt = `You are a personal memory assistant. The user has stored the following notes by voice:\n\n${notesText}\n\nThe user is now asking: "${question}"\n\nSearch through the notes and give a clear, conversational answer based only on what's in the notes. If the information isn't in the notes, say so kindly. Keep the answer short and natural, as it will be spoken aloud.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const answer = data.content?.map(b => b.text || '').join('') || 'Sorry, I couldn\'t find an answer.';

      lastAnswer = answer;
      document.getElementById('answerText').textContent = answer;
      document.getElementById('answerCard').classList.add('visible');

      // Auto-speak
      speakAnswer();

    } catch (err) {
      showToast('Error searching notes. Please try again.');
      console.error(err);
    }

    document.getElementById('actionBtn').textContent = 'Search My Notes';
    document.getElementById('actionBtn').disabled = false;
  }

  // ── SPEECH SYNTHESIS ──
  function speakAnswer() {
    if (!lastAnswer) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(lastAnswer);
    utter.rate = 0.95;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  }

  // ── NOTES TAB ──
  function renderNotes() {
    const list = document.getElementById('notesList');
    document.getElementById('notesCount').textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''} stored`;

    if (notes.length === 0) {
      list.innerHTML = '<div class="empty-notes">No notes yet. Switch to Speak and record your first note!</div>';
      return;
    }

    list.innerHTML = notes.map(n => `
      <div class="note-item" id="note-${n.id}">
        <div class="note-time">${n.time}</div>
        <div class="note-text">${n.text}</div>
        <button class="note-delete" onclick="deleteNote(${n.id})">Delete this note</button>
      </div>
    `).join('');
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem('voiceNotes', JSON.stringify(notes));
    renderNotes();
    showToast('Note deleted');
  }

  function clearAllNotes() {
    if (!confirm('Delete all notes?')) return;
    notes = [];
    localStorage.setItem('voiceNotes', JSON.stringify(notes));
    renderNotes();
    showToast('All notes cleared');
  }

  // ── TABS ──
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'record') || (i === 1 && tab === 'notes'));
    });
    document.getElementById('recordPanel').style.display = tab === 'record' ? 'flex' : 'none';
    document.getElementById('notesPanel').classList.toggle('visible', tab === 'notes');
    if (tab === 'notes') renderNotes();
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Init
  setMode('store');
</script>
</body>
</html>
