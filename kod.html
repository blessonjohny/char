<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>കൂടീശ്വരൻ - Koodeeshwaran</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700;900&family=Orbitron:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --gold: #FFD700;
    --gold-bright: #FFF5A0;
    --gold-dark: #B8860B;
    --gold-dim: #8B6914;
    --blue-glow: #1a3a6e;
    --blue-neon: #00d4ff;
    --danger: #ff3333;
    --success: #00ff88;
    --warning: #ffaa00;
    --bg-dark: #050508;
    --bg-panel: #0a0a12;
    --bg-panel-light: #12121e;
    --border-gold: rgba(255, 215, 0, 0.3);
    --border-gold-bright: rgba(255, 215, 0, 0.6);
}

body {
    font-family: 'Noto Sans Malayalam', 'Inter', sans-serif;
    background: var(--bg-dark);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
}

/* ===== AMBIENT STUDIO BACKGROUND ===== */
.studio-bg {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: 
        radial-gradient(ellipse at 50% 100%, rgba(26, 58, 110, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(255, 215, 0, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, #050508 0%, #0a0a15 50%, #050508 100%);
}

/* Spotlight beams */
.spotlight {
    position: fixed;
    z-index: -1;
    pointer-events: none;
}
.spotlight-left {
    top: -10%;
    left: 10%;
    width: 200px;
    height: 120vh;
    background: linear-gradient(180deg, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
    transform: rotate(-15deg);
    filter: blur(40px);
    animation: spotMove1 8s ease-in-out infinite;
}
.spotlight-right {
    top: -10%;
    right: 10%;
    width: 200px;
    height: 120vh;
    background: linear-gradient(180deg, rgba(255, 215, 0, 0.12) 0%, transparent 70%);
    transform: rotate(15deg);
    filter: blur(40px);
    animation: spotMove2 10s ease-in-out infinite;
}
.spotlight-center {
    top: -5%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 100vh;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
    filter: blur(60px);
    animation: spotPulse 6s ease-in-out infinite;
}

@keyframes spotMove1 {
    0%, 100% { transform: rotate(-15deg) translateX(0); opacity: 0.6; }
    50% { transform: rotate(-12deg) translateX(30px); opacity: 1; }
}
@keyframes spotMove2 {
    0%, 100% { transform: rotate(15deg) translateX(0); opacity: 0.5; }
    50% { transform: rotate(12deg) translateX(-30px); opacity: 0.9; }
}
@keyframes spotPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
}

/* Floating particles */
.particles {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    overflow: hidden;
}
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp 10s linear infinite;
    box-shadow: 0 0 6px var(--gold), 0 0 12px var(--gold);
}
@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* Floor glow */
.floor-glow {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(0deg, rgba(255, 215, 0, 0.08) 0%, transparent 100%);
    z-index: -1;
    pointer-events: none;
}

/* ===== TITLE SCREEN ===== */
.title-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    position: relative;
}

.logo-container {
    position: relative;
    margin-bottom: 40px;
}

.logo-ring {
    width: 220px;
    height: 220px;
    border: 4px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: pulse 3s ease-in-out infinite;
    box-shadow: 
        0 0 60px rgba(255, 215, 0, 0.3),
        0 0 120px rgba(255, 215, 0, 0.1),
        inset 0 0 60px rgba(255, 215, 0, 0.05);
}

.logo-ring::before {
    content: '';
    position: absolute;
    inset: -15px;
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 50%;
    animation: rotate 15s linear infinite;
}

.logo-ring::after {
    content: '';
    position: absolute;
    inset: -30px;
    border: 1px solid rgba(255, 215, 0, 0.1);
    border-radius: 50%;
    animation: rotate 20s linear infinite reverse;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 215, 0, 0.1), inset 0 0 60px rgba(255, 215, 0, 0.05); }
    50% { transform: scale(1.03); box-shadow: 0 0 80px rgba(255, 215, 0, 0.5), 0 0 160px rgba(255, 215, 0, 0.2), inset 0 0 80px rgba(255, 215, 0, 0.1); }
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 215, 0, 0.3);
}

.logo-sub {
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-size: 1.4rem;
    color: var(--gold-bright);
    margin-top: 8px;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
}

.title-screen h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    font-weight: 900;
}

.title-screen .subtitle {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
    letter-spacing: 1px;
}

.start-btn {
    padding: 16px 60px;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
    color: var(--gold);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s;
    font-family: 'Noto Sans Malayalam', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
}

.start-btn:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--bg-dark);
    transform: translateY(-3px);
    box-shadow: 0 10px 40px rgba(255, 215, 0, 0.5), 0 0 80px rgba(255, 215, 0, 0.3);
}

/* ===== GAME SCREEN ===== */
.game-screen {
    display: none;
    min-height: 100vh;
    padding: 8px;
    max-width: 1400px;
    margin: 0 auto;
}

/* Top Bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background: linear-gradient(90deg, rgba(10,10,18,0.9), rgba(18,18,30,0.9));
    border-radius: 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border-gold);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.05);
}

.game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
    text-shadow: 0 0 15px rgba(255,215,0,0.4);
    letter-spacing: 2px;
}

.prize-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    letter-spacing: 1px;
}

.walk-away-btn {
    padding: 8px 20px;
    background: linear-gradient(135deg, rgba(255,170,0,0.15), rgba(255,170,0,0.05));
    border: 1px solid var(--warning);
    color: var(--warning);
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    transition: all 0.3s;
    box-shadow: 0 0 15px rgba(255,170,0,0.1);
}

.walk-away-btn:hover {
    background: var(--warning);
    color: var(--bg-dark);
    box-shadow: 0 0 25px rgba(255,170,0,0.4);
}

/* ===== MAIN LAYOUT ===== */
.game-layout {
    display: flex;
    gap: 12px;
    height: calc(100vh - 80px);
    min-height: 600px;
}

/* Left Panel */
.left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
}

/* Host Area */
.host-area {
    background: linear-gradient(135deg, rgba(10,10,18,0.95), rgba(18,18,30,0.95));
    border-radius: 15px;
    padding: 12px 18px;
    border: 1px solid var(--border-gold);
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 70px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,0,0.1);
}

.host-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.host-text {
    font-size: 1rem;
    line-height: 1.4;
    color: var(--gold-bright);
}

.host-text .english {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    font-style: italic;
    margin-top: 3px;
}

/* Question Box */
.question-box {
    background: linear-gradient(135deg, rgba(18,18,30,0.95), rgba(10,10,18,0.95));
    border-radius: 16px;
    padding: 18px 22px;
    border: 2px solid var(--border-gold-bright);
    position: relative;
    box-shadow: 
        0 0 30px rgba(255,215,0,0.08),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,215,0,0.1);
}

.question-box::before {
    content: '';
    position: absolute;
    top: -2px;
    left: 20%;
    right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
}

.question-number {
    font-family: 'Orbitron', sans-serif;
    color: var(--blue-neon);
    font-size: 0.8rem;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.question-text {
    font-size: 1.25rem;
    line-height: 1.5;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.question-english {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.55);
    font-style: italic;
}

/* Timer */
.timer-bar {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-top: 14px;
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}

.timer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
    border-radius: 3px;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px rgba(0,255,136,0.3);
}

/* Options - TV Style */
.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.option-btn {
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(18,18,30,0.9), rgba(10,10,18,0.9));
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Noto Sans Malayalam', 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
    text-align: left;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    min-height: 60px;
}

.option-btn::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: var(--blue-neon);
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 14px 0 0 14px;
}

.option-btn:hover:not(.disabled):not(.selected) {
    border-color: var(--gold);
    transform: translateX(4px) scale(1.01);
    background: linear-gradient(135deg, rgba(30,30,50,0.95), rgba(18,18,35,0.95));
    box-shadow: 0 6px 25px rgba(255,215,0,0.15), 0 0 30px rgba(255,215,0,0.05);
}

.option-btn:hover:not(.disabled):not(.selected)::before {
    opacity: 1;
    background: var(--gold);
}

.option-btn.selected {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
    box-shadow: 0 0 25px rgba(255,215,0,0.2), 0 0 50px rgba(255,215,0,0.1);
    transform: scale(1.02);
}

.option-btn.selected::before {
    opacity: 1;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
}

.option-btn.correct {
    background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.08));
    border-color: var(--success);
    box-shadow: 0 0 30px rgba(0,255,136,0.3), 0 0 60px rgba(0,255,136,0.1);
    animation: correctPulse 0.6s ease;
}

.option-btn.wrong {
    background: linear-gradient(135deg, rgba(255,51,51,0.2), rgba(255,51,51,0.08));
    border-color: var(--danger);
    box-shadow: 0 0 30px rgba(255,51,51,0.3);
    animation: shake 0.5s ease;
}

.option-btn.disabled {
    opacity: 0.25;
    cursor: not-allowed;
    filter: grayscale(0.8);
}

.option-label {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    color: var(--gold);
    font-size: 1.2rem;
    min-width: 32px;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
}

.option-text {
    flex: 1;
    text-align: left;
    font-size: 0.95rem;
    line-height: 1.3;
}

.option-english {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
}

@keyframes correctPulse {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.03); }
    50% { transform: scale(1.01); }
    75% { transform: scale(1.03); }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

/* Confirm Button */
.confirm-area {
    display: none;
    text-align: center;
    margin-top: 6px;
}

.confirm-btn {
    padding: 12px 50px;
    font-size: 1.1rem;
    font-weight: 700;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,215,0,0.08));
    color: var(--gold);
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Sans Malayalam', sans-serif;
    box-shadow: 0 0 25px rgba(255,215,0,0.2);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.confirm-btn:hover {
    background: var(--gold);
    color: var(--bg-dark);
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255,215,0,0.5);
}

/* Lifelines */
.lifelines {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 4px;
}

.lifeline-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.03));
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    box-shadow: 0 0 20px rgba(255,215,0,0.1);
}

.lifeline-btn:hover:not(.used) {
    transform: scale(1.15) rotate(5deg);
    box-shadow: 0 0 30px rgba(255,215,0,0.4), 0 0 60px rgba(255,215,0,0.2);
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--bg-dark);
}

.lifeline-btn.used {
    opacity: 0.2;
    border-color: #444;
    cursor: not-allowed;
    text-decoration: line-through;
    box-shadow: none;
}

/* ===== RIGHT PANEL - PRIZE LADDER ===== */
.right-panel {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
}

.prize-ladder {
    background: linear-gradient(180deg, rgba(10,10,18,0.9), rgba(18,18,30,0.9));
    border-radius: 14px;
    padding: 12px;
    border: 1px solid var(--border-gold);
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,0,0.05);
    min-height: 0;
    overflow-y: auto;
}

.prize-item {
    display: flex;
    align-items: center;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 0.8rem;
    transition: all 0.3s;
    gap: 8px;
    min-height: 28px;
}

.prize-item.active {
    background: linear-gradient(90deg, rgba(255,215,0,0.25), rgba(255,215,0,0.05));
    border-left: 3px solid var(--gold);
    font-weight: 700;
    color: var(--gold);
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
    transform: scale(1.05);
}

.prize-item.milestone {
    color: var(--warning);
    font-weight: 600;
    text-shadow: 0 0 10px rgba(255,170,0,0.3);
}

.prize-item.won {
    color: var(--success);
    text-shadow: 0 0 10px rgba(0,255,136,0.3);
}

.prize-number {
    width: 24px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    text-align: center;
}

.prize-amount {
    flex: 1;
    text-align: right;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.5px;
}

/* ===== OVERLAYS ===== */
.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,8,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
}

.overlay-modal {
    background: linear-gradient(135deg, rgba(18,18,30,0.98), rgba(10,10,18,0.98));
    border: 2px solid var(--gold);
    border-radius: 24px;
    padding: 35px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    box-shadow: 
        0 0 60px rgba(255,215,0,0.2),
        0 0 120px rgba(255,215,0,0.1),
        0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

.overlay-modal::before {
    content: '';
    position: absolute;
    top: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.overlay-title {
    font-size: 1.6rem;
    color: var(--gold);
    margin-bottom: 18px;
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(255,215,0,0.3);
}

.overlay-text {
    font-size: 1.1rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.9);
    margin-bottom: 25px;
}

.overlay-btn {
    padding: 14px 40px;
    font-size: 1.05rem;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-weight: 700;
    margin: 6px;
    box-shadow: 0 0 20px rgba(255,215,0,0.1);
}

.overlay-btn:hover {
    background: var(--gold);
    color: var(--bg-dark);
    box-shadow: 0 0 40px rgba(255,215,0,0.4);
    transform: scale(1.05);
}

/* Poll Overlay */
.poll-bar {
    display: flex;
    align-items: center;
    margin: 12px 0;
    gap: 12px;
}

.poll-label {
    width: 40px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    color: var(--gold);
    font-size: 1rem;
    text-shadow: 0 0 10px rgba(255,215,0,0.4);
}

.poll-track {
    flex: 1;
    height: 32px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

.poll-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-neon), var(--gold));
    border-radius: 10px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
}

/* Expert Overlay */
.expert-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    margin: 0 auto 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    box-shadow: 0 0 40px rgba(255,215,0,0.4);
}

.expert-name {
    font-size: 1.15rem;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 700;
    text-shadow: 0 0 15px rgba(255,215,0,0.3);
}

.expert-speech {
    font-size: 1.05rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.9);
    padding: 18px;
    background: rgba(0,0,0,0.3);
    border-radius: 14px;
    border-left: 4px solid var(--gold);
    font-family: 'Noto Sans Malayalam', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* Game Over */
.game-over-title {
    font-size: 2.8rem;
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 18px;
    text-shadow: 0 0 40px rgba(255,215,0,0.4);
}

.game-over-title.win {
    color: var(--gold);
    text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3);
}

.game-over-title.lose {
    color: var(--danger);
    text-shadow: 0 0 40px rgba(255,51,51,0.4);
}

.final-prize {
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 18px;
    font-family: 'Orbitron', sans-serif;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: confetti-fall 4s linear forwards;
    z-index: 150;
    border-radius: 2px;
}

@keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) rotate(1080deg) scale(0.5); opacity: 0; }
}

        { ml: '50:50 ഉപയോഗിക്കുന്നു! രണ്ട് തെറ്റായ ഉത്തരങ്ങൾ നീക്കം ചെയ്തു!', en: 'Using 50:50! Two wrong answers removed!' }
    ],
    lifelinePoll: [
        { ml: 'പ്രേക്ഷക വോട്ടെടുപ്പ്! നോക്കൂ എന്താണ് ജനങ്ങൾ പറയുന്നത്!', en: 'Audience poll! Let us see what the people say!' }
    ],
    lifelineExpert: [
        { ml: 'വിദഗ്ധ സഹായം! ഞങ്ങളുടെ വിദഗ്ധനെ വിളിക്കാം!', en: 'Expert help! Let us call our expert!' }
    ],
    lifelineFlip: [
        { ml: 'ചോദ്യം മാറ്റുന്നു! പുതിയ ചോദ്യം വരുന്നു!', en: 'Flipping the question! New question coming!' }
    ],
    questionIntro: [
        { ml: 'ചോദ്യം നമ്പർ {n}... {amount} രൂപയ്ക്ക്!', en: 'Question number {n}... for Rs {amount}!' },
        { ml: 'ഇനി {n} ആം ചോദ്യം... {amount} രൂപ!', en: 'Now the {n}th question... for Rs {amount}!' }
    ]
};

// ===== SOUND EFFECTS (Web Audio API) =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        switch(type) {
            case 'select':
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.15);
                break;
            case 'lock':
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
                break;
            case 'correct':
                [523, 659, 784, 1047].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                    g.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
                    o.start(audioCtx.currentTime + i * 0.15);
                    o.stop(audioCtx.currentTime + i * 0.15 + 0.3);
                });
                break;
            case 'wrong':
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.5);
                break;
            case 'milestone':
                [523, 659, 784, 1047, 1319].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.1);
                    g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                    o.start(audioCtx.currentTime + i * 0.1);
                    o.stop(audioCtx.currentTime + i * 0.1 + 0.4);
                });
                break;
            case 'tick':
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.05);
                break;
            case 'lifeline':
                osc.frequency.setValueAtTime(700, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.2);
                break;
            case 'win':
                [523, 659, 784, 1047, 1319, 1568].forEach((freq, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.12);
                    g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.12 + 0.5);
                    o.start(audioCtx.currentTime + i * 0.12);
                    o.stop(audioCtx.currentTime + i * 0.12 + 0.5);
                });
                break;
        }
    } catch(e) { console.log('Audio error:', e); }
}

// ===== HOST FUNCTIONS =====
function setHostText(ml, en) {
    const hostText = document.getElementById('hostText');
    hostText.innerHTML = '<div>' + ml + '</div><div class="english">' + en + '</div>';
    const hostArea = document.getElementById('hostArea');
    hostArea.style.animation = 'none';
    hostArea.offsetHeight;
    hostArea.style.animation = 'fadeIn 0.5s ease';
}

function getRandomCommentary(type, replacements) {
    replacements = replacements || {};
    const list = hostCommentaries[type];
    let item = list[Math.floor(Math.random() * list.length)];
    let ml = item.ml;
    let en = item.en;
    for (let key in replacements) {
        ml = ml.replace('{' + key + '}', replacements[key]);
        en = en.replace('{' + key + '}', replacements[key]);
    }
    return { ml: ml, en: en };
}

// ===== INITIALIZE =====
function initPrizeLadder() {
    const ladder = document.getElementById('prizeLadder');
    ladder.innerHTML = '';
    for (let i = 14; i >= 0; i--) {
        const div = document.createElement('div');
        div.className = 'prize-item' + (milestones.includes(i) ? ' milestone' : '');
        div.id = 'prize-' + i;
        div.innerHTML = '<span class="prize-number">' + (i+1) + '</span><span class="prize-amount">Rs' + prizeAmounts[i].toLocaleString() + '</span>';
        ladder.appendChild(div);
    }
}

function shuffleArray(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

function selectQuestions() {
    return shuffleArray(questionLibrary).slice(0, 15);
}

// ===== PARTICLES =====
function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.animationDuration = (8 + Math.random() * 6) + 's';
        container.appendChild(p);
    }
}

// ===== GAME START =====
function startGame() {
    document.getElementById('titleScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('gameOverOverlay').style.display = 'none';

    currentQuestion = 0;
    currentPrize = 0;
    safePrize = 0;
    selectedAnswer = -1;
    lifelines = { '50-50': false, 'poll': false, 'expert': false, 'flip': false };
    questions = selectQuestions();

    document.querySelectorAll('.lifeline-btn').forEach(function(btn) { btn.classList.remove('used'); });

    initPrizeLadder();

    const commentary = getRandomCommentary('start');
    setHostText(commentary.ml, commentary.en);
    playSound('milestone');

    setTimeout(function() { loadQuestion(); }, 2000);
}

// ===== LOAD QUESTION =====
function loadQuestion() {
    if (currentQuestion >= 15) {
        endGame(true);
        return;
    }

    isProcessing = false;
    selectedAnswer = -1;
    document.getElementById('confirmArea').style.display = 'none';

    const q = questions[currentQuestion];
    const amount = prizeAmounts[currentQuestion].toLocaleString();

    const commentary = getRandomCommentary('questionIntro', { n: currentQuestion + 1, amount: amount });
    setHostText(commentary.ml, commentary.en);

    document.getElementById('questionNumber').textContent = 'QUESTION ' + (currentQuestion + 1) + ' of 15';
    document.getElementById('questionText').textContent = q.ml;
    document.getElementById('questionEnglish').textContent = q.en;
    document.getElementById('currentPrize').textContent = 'Rs ' + currentPrize.toLocaleString();

    document.querySelectorAll('.prize-item').forEach(function(item, idx) {
        item.classList.remove('active', 'won');
        if (idx === 14 - currentQuestion) item.classList.add('active');
        if (idx > 14 - currentQuestion) item.classList.add('won');
    });

    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    const labels = ['A', 'B', 'C', 'D'];

    q.options.forEach(function(opt, idx) {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.id = 'opt-' + idx;
        btn.innerHTML = '<span class="option-label">' + labels[idx] + '</span><div class="option-text"><div>' + opt.ml + '</div><div class="option-english">' + opt.en + '</div></div>';
        btn.onclick = function() { selectAnswer(idx); };
        grid.appendChild(btn);
    });

    startTimer();
}

// ===== TIMER =====
function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 45;
    const fill = document.getElementById('timerFill');
    fill.style.width = '100%';

    timerInterval = setInterval(function() {
        timeLeft--;
        fill.style.width = ((timeLeft / 45) * 100) + '%';

        if (timeLeft <= 10) {
            playSound('tick');
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            setHostText('സമയം കഴിഞ്ഞു! ഗേം ഓവർ!', 'Time is up! Game Over!');
            playSound('wrong');
            setTimeout(function() { endGame(false, 'സമയം കഴിഞ്ഞു! / Time Up!'); }, 2000);
        }
    }, 1000);
}

// ===== SELECT ANSWER =====
function selectAnswer(idx) {
    if (isProcessing) return;

    playSound('select');

    document.querySelectorAll('.option-btn').forEach(function(btn) { btn.classList.remove('selected'); });

    selectedAnswer = idx;
    document.getElementById('opt-' + idx).classList.add('selected');
    document.getElementById('confirmArea').style.display = 'block';

    const commentary = getRandomCommentary('select');
    setHostText(commentary.ml, commentary.en);
}

// ===== CONFIRM ANSWER =====
function confirmAnswer() {
    if (selectedAnswer === -1 || isProcessing) return;
    isProcessing = true;
    clearInterval(timerInterval);

    playSound('lock');

    const q = questions[currentQuestion];
    const buttons = document.querySelectorAll('.option-btn');

    buttons.forEach(function(btn) { btn.classList.add('disabled'); });
    buttons[selectedAnswer].classList.remove('disabled');

    setHostText('ഉത്തരം ലോക്ക് ചെയ്തു! ശരിയാണോ എന്ന് നോക്കാം...', 'Answer locked! Let us see if it is correct...');

    setTimeout(function() {
        if (selectedAnswer === q.correct) {
            buttons[selectedAnswer].classList.add('correct');
            currentPrize = prizeAmounts[currentQuestion];

            if (milestones.includes(currentQuestion)) {
                safePrize = currentPrize;
                playSound('milestone');
                const commentary = getRandomCommentary('milestone');
                setHostText(commentary.ml, commentary.en);
                createConfetti();
            } else {
                playSound('correct');
                const commentary = getRandomCommentary('correct');
                setHostText(commentary.ml, commentary.en);
            }

            setTimeout(function() {
                currentQuestion++;
                loadQuestion();
            }, milestones.includes(currentQuestion) ? 4000 : 2500);

        } else {
            buttons[selectedAnswer].classList.add('wrong');
            buttons[q.correct].classList.add('correct');

            playSound('wrong');
            const commentary = getRandomCommentary('wrong');
            setHostText(commentary.ml, commentary.en);

            setTimeout(function() {
                showResultOverlay(false);
            }, 2500);
        }
    }, 2000);
}

// ===== RESULT OVERLAY =====
function showResultOverlay(won) {
    const overlay = document.getElementById('resultOverlay');
    const title = document.getElementById('resultTitle');
    const text = document.getElementById('resultText');
    const btn = document.getElementById('resultBtn');

    if (won) {
        title.textContent = '✅ ശരി! / Correct!';
        title.style.color = 'var(--success)';
        text.innerHTML = 'അഭിനന്ദനങ്ങൾ! നിങ്ങൾ Rs ' + currentPrize.toLocaleString() + ' നേടി!<br>Congratulations! You won Rs ' + currentPrize.toLocaleString() + '!';
        btn.textContent = 'അടുത്ത ചോദ്യം / Next Question';
        btn.onclick = function() { closeResultOverlay(); loadQuestion(); };
    } else {
        title.textContent = '❌ തെറ്റ്! / Wrong!';
        title.style.color = 'var(--danger)';
        text.innerHTML = 'ക്ഷമിക്കണം! ശരിയായ ഉത്തരം ' + String.fromCharCode(65 + questions[currentQuestion].correct) + ' ആയിരുന്നു.<br>Sorry! The correct answer was ' + String.fromCharCode(65 + questions[currentQuestion].correct) + '.<br><br>നിങ്ങൾ നേടിയത്: Rs ' + safePrize.toLocaleString();
        btn.textContent = 'ഗേം ഓവർ / Game Over';
        btn.onclick = function() { closeResultOverlay(); showGameOver(false); };
    }

    overlay.style.display = 'flex';
}

function closeResultOverlay() {
    document.getElementById('resultOverlay').style.display = 'none';
}

function nextQuestion() {
    closeResultOverlay();
    loadQuestion();
}

// ===== LIFELINES =====
function useLifeline(type) {
    if (lifelines[type] || isProcessing) return;
    lifelines[type] = true;
    document.getElementById('ll' + (type === '50-50' ? '50' : type === 'poll' ? 'Poll' : type === 'expert' ? 'Expert' : 'Flip')).classList.add('used');

    playSound('lifeline');

    const q = questions[currentQuestion];
    const buttons = document.querySelectorAll('.option-btn');

    switch(type) {
        case '50-50':
            const commentary50 = getRandomCommentary('lifeline50');
            setHostText(commentary50.ml, commentary50.en);
            let wrongIndices = [];
            for (let i = 0; i < q.options.length; i++) {
                if (i !== q.correct) wrongIndices.push(i);
            }
            const toRemove = shuffleArray(wrongIndices).slice(0, 2);
            for (let i = 0; i < toRemove.length; i++) {
                buttons[toRemove[i]].classList.add('disabled');
                buttons[toRemove[i]].style.opacity = '0.3';
            }
            break;

        case 'poll':
            const commentaryPoll = getRandomCommentary('lifelinePoll');
            setHostText(commentaryPoll.ml, commentaryPoll.en);
            showPoll(q);
            break;

        case 'expert':
            const commentaryExpert = getRandomCommentary('lifelineExpert');
            setHostText(commentaryExpert.ml, commentaryExpert.en);
            showExpert(q);
            break;

        case 'flip':
            const commentaryFlip = getRandomCommentary('lifelineFlip');
            setHostText(commentaryFlip.ml, commentaryFlip.en);
            const remaining = [];
            for (let i = 0; i < questionLibrary.length; i++) {
                if (!questions.includes(questionLibrary[i])) {
                    remaining.push(questionLibrary[i]);
                }
            }
            questions[currentQuestion] = shuffleArray(remaining)[0];
            setTimeout(function() { loadQuestion(); }, 1500);
            break;
    }
}

// ===== POLL =====
function showPoll(q) {
    const overlay = document.getElementById('pollOverlay');
    const bars = document.getElementById('pollBars');
    bars.innerHTML = '';

    const labels = ['A', 'B', 'C', 'D'];
    let percentages = [15, 20, 25, 40];
    const temp = percentages[0];
    percentages[0] = percentages[q.correct];
    percentages[q.correct] = temp;
    percentages = shuffleArray(percentages);
    percentages[q.correct] = Math.max.apply(null, percentages) + 5 + Math.floor(Math.random() * 10);

    const total = percentages.reduce(function(a, b) { return a + b; }, 0);
    percentages = percentages.map(function(p) { return Math.round((p / total) * 100); });

    for (let idx = 0; idx < q.options.length; idx++) {
        const bar = document.createElement('div');
        bar.className = 'poll-bar';
        bar.innerHTML = '<span class="poll-label">' + labels[idx] + '</span><div class="poll-track"><div class="poll-fill" style="width:0%" data-width="' + percentages[idx] + '%">' + percentages[idx] + '%</div></div>';
        bars.appendChild(bar);
    }

    overlay.style.display = 'flex';

    setTimeout(function() {
        const fills = document.querySelectorAll('.poll-fill');
        for (let i = 0; i < fills.length; i++) {
            fills[i].style.width = fills[i].dataset.width;
        }
    }, 100);
}

function closePoll() {
    document.getElementById('pollOverlay').style.display = 'none';
}

// ===== EXPERT =====
function showExpert(q) {
    const overlay = document.getElementById('expertOverlay');
    const speech = document.getElementById('expertSpeech');

    const labels = ['A', 'B', 'C', 'D'];
    const correctLabel = labels[q.correct];

    const isCorrect = Math.random() < 0.9;
    const suggestedLabel = isCorrect ? correctLabel : labels[Math.floor(Math.random() * 4)];

    const expertNames = [
        'Dr. Radhakrishnan',
        'Prof. Shankaran',
        'Dr. Meeradevi',
        'Prof. Krishnamoorthy'
    ];

    document.getElementById('expertName').textContent = expertNames[Math.floor(Math.random() * expertNames.length)];

    speech.innerHTML = '<div>ഞാൻ ' + suggestedLabel + ' ഓപ്ഷൻ തിരഞ്ഞെടുക്കും.</div><div style="margin-top:8px;color:rgba(255,255,255,0.7);font-size:0.9rem;">I would choose option ' + suggestedLabel + '.</div><div style="margin-top:8px;color:var(--blue-neon);font-size:0.85rem;">ഉറപ്പ്: ' + (isCorrect ? '90%' : '60%') + ' / Confidence: ' + (isCorrect ? '90%' : '60%') + '</div>';

    overlay.style.display = 'flex';
}

function closeExpert() {
    document.getElementById('expertOverlay').style.display = 'none';
}

// ===== WALK AWAY =====
function confirmWalkAway() {
    if (isProcessing) return;
    document.getElementById('confirmOverlay').style.display = 'flex';
    document.getElementById('confirmTitle').textContent = 'വിട്ടുകൊടുക്കണോ? / Walk Away?';
    document.getElementById('confirmText').innerHTML = 'നിങ്ങൾ Rs ' + currentPrize.toLocaleString() + ' നേടി!<br>You have won Rs ' + currentPrize.toLocaleString() + '!<br><br>വിട്ടുകൊടുക്കണോ? / Do you want to walk away?';

    window.confirmYes = function() {
        document.getElementById('confirmOverlay').style.display = 'none';
        const commentary = getRandomCommentary('walkAway');
        setHostText(commentary.ml, commentary.en);
        playSound('milestone');
        setTimeout(function() { showGameOver(true); }, 2000);
    };
    window.confirmNo = function() {
        document.getElementById('confirmOverlay').style.display = 'none';
    };
}

function showGameOver(won) {
    const overlay = document.getElementById('gameOverOverlay');
    const title = document.getElementById('gameOverTitle');
    const prize = document.getElementById('finalPrize');
    const msg = document.getElementById('gameOverMessage');

    if (won) {
        if (currentQuestion >= 15) {
            title.textContent = 'MILLIONAIRE!';
            title.className = 'game-over-title win';
            prize.textContent = 'Rs ' + currentPrize.toLocaleString();
            msg.innerHTML = 'Congratulations! You became a Millionaire!';
            playSound('win');
            createConfetti();
        } else {
            title.textContent = 'Well Done!';
            title.className = 'game-over-title win';
            prize.textContent = 'Rs ' + currentPrize.toLocaleString();
            msg.innerHTML = 'You walked away! A wise decision!';
            playSound('milestone');
        }
    } else {
        title.textContent = 'GAME OVER';
        title.className = 'game-over-title lose';
        prize.textContent = 'Rs ' + safePrize.toLocaleString();
        msg.innerHTML = 'Try again! You can do it!';
    }

    overlay.style.display = 'flex';
}

function endGame(won, message) {
    clearInterval(timerInterval);
    showGameOver(won);
}

function restartGame() {
    document.getElementById('gameOverOverlay').style.display = 'none';
    startGame();
}

// ===== CONFETTI =====
function createConfetti() {
    const colors = ['#FFD700', '#00d4ff', '#ff4444', '#00ff88', '#ffaa00', '#ff00ff', '#00ffff'];
    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.width = (Math.random() * 8 + 4) + 'px';
        confetti.style.height = (Math.random() * 8 + 4) + 'px';
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(confetti);
        setTimeout(function() { confetti.remove(); }, 5000);
    }
}

// Initialize
window.onload = function() {
    initPrizeLadder();
    createParticles();
};
